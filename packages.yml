---
- name: Install packages on dev and test
  hosts: dev,test
  become: true

  tasks:
    - name: Install mariadb server
      yum:
        name: mariadb105-server
        state: present

    - name: Install php
      yum:
        name: php
        state: present

- name: Update and install RPM Development Tools on dev
  hosts: dev
  become: true

  tasks:
    - name: Update all packages
      yum:
        name: '*'
        state: latest

    - name: Install Development Tools
      yum:
        name: "@Development Tools"
        state: present
